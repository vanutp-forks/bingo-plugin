# speed boost if holding bingo card
enable-speed-bonus: true
# give permanent fire res on round start
enable-fire-resistance-effect: false
# give permanent water breathing on round start
enable-water-breathing-effect: true
# give permanent night vision on round start
enable-night-vision-effect: true
# legacy starter kit on round start
give-initial-items: true
# ignore normal fall damage for participants
prevent-fall-damage: true
# tp player back to death point after punishment
teleport-back-on-death: true
# restore inv/armor/offhand after punishment
return-items-on-death: true
# lock bingo card movement/drop/swap
fix-bingo-card: false
# show global points in player list
show-global-score: true
# manual claim consumes 1 matching item
consume-on-claim: true
# arena world name (fallback = first world)
default-world-name: world
# pregame countdown in seconds
countdown-time: 10
# death punishment duration in seconds
punishment-time: 10
# grace period before auto end in seconds
after-game-time: 10
# print debug information about node costs and generated boards
print-debug-information: false
# board claim mode: auto | manual
board-claim-mode: auto
# default bingo mode
default-mode: default
# default bingo difficulty key
default-difficulty: easy

# order = list position
# target-score = wanted average board cell score
# max-deviation = allowed +/- spread for cell + average checks
# durations = round timer per mode in seconds
difficulty-levels:
  - key: baby
    target-score: 10
    max-deviation: 10
    durations:
      default: 600
      butfast: 300
      collectall: 900
  - key: easy
    target-score: 30
    max-deviation: 20
    durations:
      default: 900
      butfast: 600
      collectall: 1200
  - key: medium
    target-score: 75
    max-deviation: 35
    durations:
      default: 1200
      butfast: 900
      collectall: 1800
  - key: hard
    target-score: 150
    max-deviation: 50
    durations:
      default: 1800
      butfast: 1200
      collectall: 2400
  - key: insane
    target-score: 400
    max-deviation: 200
    durations:
      default: 3600
      butfast: 2400
      collectall: 21600
